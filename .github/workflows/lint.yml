name: Lint

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # prek — pre-release readiness checks
  # --------------------------------------------------------------------------
  prek:
    name: prek
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Run prek
        run: nox -s prek

  # --------------------------------------------------------------------------
  # mypy — static type checking
  # --------------------------------------------------------------------------
  mypy:
    name: mypy
    runs-on: ubuntu-latest
    # Continue on errors for PRs so they don't block merges during type-work phases
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Run mypy
        run: nox -s typecheck

  # --------------------------------------------------------------------------
  # llms-txt-sync — verify llms-full.txt covers all public symbols
  # --------------------------------------------------------------------------
  llms-txt-sync:
    name: llms-txt-sync
    runs-on: ubuntu-latest
    # Continue on errors for PRs; only enforce strictly on main pushes
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Install nox
        run: uv tool install nox

      - name: Check llms-full.txt
        run: nox -s llms_check
